<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Causal Impact Playground app screenshot: treatment and control trends with a DID estimate">
  <rect width="1200" height="750" fill="#f1f5f9"/>
  <!-- window chrome -->
  <rect x="40" y="40" width="1120" height="670" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="40" width="1120" height="46" rx="14" fill="#f8fafc"/>
  <circle cx="74" cy="63" r="6" fill="#fca5a5"/>
  <circle cx="96" cy="63" r="6" fill="#fcd34d"/>
  <circle cx="118" cy="63" r="6" fill="#86efac"/>
  <rect x="160" y="53" width="320" height="20" rx="10" fill="#e2e8f0" opacity="0.6"/>
  <text x="600" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#64748b">Causal Impact Playground</text>

  <!-- sidebar -->
  <rect x="40" y="86" width="240" height="624" fill="#fbfdff"/>
  <line x1="280" y1="86" x2="280" y2="710" stroke="#e2e8f0"/>
  <text x="72" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Parameters</text>
  <text x="72" y="164" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">True effect</text>
  <rect x="72" y="172" width="160" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="72" y="172" width="96" height="10" rx="5" fill="#2563eb"/>
  <text x="72" y="212" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Noise</text>
  <rect x="72" y="220" width="160" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="72" y="220" width="64" height="10" rx="5" fill="#0891b2"/>
  <text x="72" y="260" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Trend gap</text>
  <rect x="72" y="268" width="160" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="72" y="268" width="40" height="10" rx="5" fill="#94a3b8"/>
  <rect x="72" y="300" width="176" height="34" rx="8" fill="#2563eb"/>
  <text x="160" y="322" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Re-run estimation</text>
  <text x="72" y="372" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Seed: 42 (reproducible)</text>

  <!-- main chart -->
  <text x="312" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Group trends &amp; intervention</text>
  <rect x="312" y="150" width="820" height="300" rx="10" fill="#f8fafc"/>
  <!-- gridlines -->
  <line x1="312" y1="225" x2="1132" y2="225" stroke="#e2e8f0"/>
  <line x1="312" y1="300" x2="1132" y2="300" stroke="#e2e8f0"/>
  <line x1="312" y1="375" x2="1132" y2="375" stroke="#e2e8f0"/>
  <!-- control trend -->
  <polyline points="330,360 400,350 470,356 540,340 610,346 680,332 750,338 820,324 890,330 960,316 1030,322 1100,308" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <!-- treatment trend (diverges after intervention) -->
  <polyline points="330,360 400,348 470,352 540,338 610,344 680,330 750,336 820,300 890,272 960,244 1030,216 1100,188" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- intervention line -->
  <line x1="780" y1="160" x2="780" y2="440" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="788" y="178" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#e11d48">intervention</text>
  <!-- counterfactual (dashed) -->
  <polyline points="780,330 890,322 960,316 1030,310 1100,304" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5" opacity="0.6"/>
  <!-- legend -->
  <rect x="900" y="168" width="220" height="74" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="916" y1="188" x2="940" y2="188" stroke="#2563eb" stroke-width="3"/>
  <text x="948" y="192" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Treatment</text>
  <line x1="916" y1="210" x2="940" y2="210" stroke="#64748b" stroke-width="2.5"/>
  <text x="948" y="214" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Control</text>
  <line x1="916" y1="230" x2="940" y2="230" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="948" y="234" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Intervention</text>

  <!-- estimate cards -->
  <text x="312" y="492" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Estimates</text>
  <rect x="312" y="506" width="262" height="120" rx="10" fill="#eef2f7"/>
  <text x="330" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Naive pre/post difference</text>
  <text x="330" y="586" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#0f172a">+18.4</text>
  <text x="330" y="610" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#e11d48">overstates true effect</text>

  <rect x="591" y="506" width="262" height="120" rx="10" fill="#e0ecff"/>
  <text x="609" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#2563eb">Difference-in-Differences</text>
  <text x="609" y="586" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#0f172a">+10.2</text>
  <text x="609" y="610" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#16a34a">95% CI [6.1, 14.3]</text>

  <rect x="870" y="506" width="262" height="120" rx="10" fill="#f1f5f9"/>
  <text x="888" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">True effect (set above)</text>
  <text x="888" y="586" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#64748b">+10.0</text>
  <text x="888" y="610" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">ground truth</text>

  <!-- interpretation note -->
  <rect x="312" y="650" width="820" height="46" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="330" y="678" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#9a3412">⚠ Parallel-trends is an assumption, not a proof. This is a synthetic demo — not a real causal effect.</text>
</svg>
