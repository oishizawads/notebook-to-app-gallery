<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Forecasting Lab app screenshot: time series history with a forecast fan and model comparison">
  <rect width="1200" height="750" fill="#f1f5f9"/>
  <rect x="40" y="40" width="1120" height="670" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="40" width="1120" height="46" rx="14" fill="#f8fafc"/>
  <circle cx="74" cy="63" r="6" fill="#fca5a5"/>
  <circle cx="96" cy="63" r="6" fill="#fcd34d"/>
  <circle cx="118" cy="63" r="6" fill="#86efac"/>
  <rect x="160" y="53" width="320" height="20" rx="10" fill="#e2e8f0" opacity="0.6"/>
  <text x="600" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#64748b">Forecasting Lab</text>

  <!-- sidebar -->
  <rect x="40" y="86" width="240" height="624" fill="#fbfdff"/>
  <line x1="280" y1="86" x2="280" y2="710" stroke="#e2e8f0"/>
  <text x="72" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Setup</text>
  <text x="72" y="160" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Dataset</text>
  <rect x="72" y="168" width="176" height="28" rx="6" fill="#eef2f7"/>
  <text x="84" y="186" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#0f172a">Synthetic monthly</text>
  <text x="72" y="224" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Models</text>
  <rect x="72" y="232" width="176" height="30" rx="6" fill="#e0ecff"/>
  <text x="84" y="252" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#2563eb">Naive</text>
  <rect x="72" y="266" width="176" height="30" rx="6" fill="#e0ecff"/>
  <text x="84" y="286" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#2563eb">Moving Average</text>
  <rect x="72" y="300" width="176" height="30" rx="6" fill="#e0ecff"/>
  <text x="84" y="320" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#2563eb">Linear Trend</text>
  <text x="72" y="362" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Forecast horizon</text>
  <rect x="72" y="370" width="176" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="72" y="370" width="88" height="10" rx="5" fill="#0891b2"/>
  <rect x="72" y="404" width="176" height="34" rx="8" fill="#2563eb"/>
  <text x="160" y="426" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Run comparison</text>

  <!-- main chart -->
  <text x="312" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">History &amp; forecast</text>
  <rect x="312" y="150" width="820" height="300" rx="10" fill="#f8fafc"/>
  <line x1="312" y1="225" x2="1132" y2="225" stroke="#e2e8f0"/>
  <line x1="312" y1="300" x2="1132" y2="300" stroke="#e2e8f0"/>
  <line x1="312" y1="375" x2="1132" y2="375" stroke="#e2e8f0"/>
  <!-- train/test split -->
  <line x1="780" y1="160" x2="780" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="788" y="176" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">train | test</text>
  <!-- history -->
  <polyline points="330,360 390,348 450,356 510,332 570,344 630,312 690,326 750,300 780,308" fill="none" stroke="#0f172a" stroke-width="3"/>
  <!-- forecast fan -->
  <path d="M780,308 L840,290 L900,272 L960,254 L1020,236 L1080,218 L1080,266 L1020,284 L960,302 L900,320 L840,338 Z" fill="#2563eb" opacity="0.18"/>
  <!-- forecast line -->
  <polyline points="780,308 840,294 900,280 960,266 1020,252 1080,238" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- naive -->
  <polyline points="780,308 840,308 900,308 960,308 1020,308 1080,308" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- legend -->
  <rect x="330" y="168" width="180" height="86" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="346" y1="188" x2="370" y2="188" stroke="#0f172a" stroke-width="3"/>
  <text x="378" y="192" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Observed</text>
  <line x1="346" y1="210" x2="370" y2="210" stroke="#2563eb" stroke-width="3"/>
  <text x="378" y="214" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Linear forecast</text>
  <line x1="346" y1="232" x2="370" y2="232" stroke="#e11d48" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="378" y="236" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0f172a">Naive baseline</text>

  <!-- metric table -->
  <text x="312" y="492" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Evaluation (test window)</text>
  <rect x="312" y="506" width="820" height="40" rx="8" fill="#eef2f7"/>
  <text x="332" y="531" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b">Model</text>
  <text x="640" y="531" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b">MAE</text>
  <text x="860" y="531" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b">RMSE</text>
  <text x="1040" y="531" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b">Status</text>

  <text x="332" y="566" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">Naive</text>
  <text x="640" y="566" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">12.8</text>
  <text x="860" y="566" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">16.2</text>
  <circle cx="1048" cy="561" r="5" fill="#94a3b8"/>

  <text x="332" y="598" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">Moving Average</text>
  <text x="640" y="598" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">9.1</text>
  <text x="860" y="598" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">11.7</text>
  <circle cx="1048" cy="593" r="5" fill="#0891b2"/>

  <text x="332" y="630" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Linear Trend</text>
  <text x="640" y="630" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">5.4</text>
  <text x="860" y="630" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">7.1</text>
  <circle cx="1048" cy="625" r="5" fill="#16a34a"/>

  <line x1="312" y1="556" x2="1132" y2="556" stroke="#e2e8f0"/>
  <line x1="312" y1="588" x2="1132" y2="588" stroke="#e2e8f0"/>
  <line x1="312" y1="620" x2="1132" y2="620" stroke="#e2e8f0"/>

  <rect x="312" y="650" width="820" height="46" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="330" y="678" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#166534">Simple models compared for teaching. Not a production forecast guarantee.</text>
</svg>
