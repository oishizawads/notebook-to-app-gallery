<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Notebook to App: analysis notebook transforming into an interactive app">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="url(#heroBg)"/>

  <!-- Notebook (left) -->
  <g transform="translate(120,70)">
    <rect x="0" y="0" width="260" height="280" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="260" height="34" rx="14" fill="#eef2f7"/>
    <circle cx="22" cy="17" r="5" fill="#cbd5e1"/>
    <circle cx="40" cy="17" r="5" fill="#cbd5e1"/>
    <circle cx="58" cy="17" r="5" fill="#cbd5e1"/>
    <!-- code lines -->
    <rect x="20" y="54" width="150" height="8" rx="4" fill="#2563eb" opacity="0.55"/>
    <rect x="20" y="70" width="120" height="8" rx="4" fill="#94a3b8" opacity="0.6"/>
    <rect x="36" y="86" width="180" height="8" rx="4" fill="#94a3b8" opacity="0.45"/>
    <!-- inline plot -->
    <rect x="20" y="110" width="220" height="120" rx="8" fill="#f1f5f9"/>
    <polyline points="32,210 64,180 96,196 128,150 160,168 192,120 224,140" fill="none" stroke="#0891b2" stroke-width="2.5"/>
    <rect x="20" y="244" width="200" height="8" rx="4" fill="#94a3b8" opacity="0.45"/>
    <rect x="20" y="260" width="90" height="8" rx="4" fill="#94a3b8" opacity="0.45"/>
  </g>

  <!-- Arrow (center) -->
  <g transform="translate(440,200)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <text x="150" y="-26" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" font-weight="600" fill="#2563eb">notebook → app</text>
    <text x="150" y="34" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#64748b">interactive · reusable · shareable</text>
  </g>

  <!-- App (right) -->
  <g transform="translate(820,70)">
    <rect x="0" y="0" width="260" height="280" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="34" rx="14" fill="#2563eb"/>
    <circle cx="20" cy="17" r="5" fill="#ffffff" opacity="0.7"/>
    <circle cx="38" cy="17" r="5" fill="#ffffff" opacity="0.7"/>
    <circle cx="56" cy="17" r="5" fill="#ffffff" opacity="0.7"/>
    <rect x="80" y="9" width="120" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
    <!-- controls -->
    <rect x="20" y="52" width="80" height="22" rx="6" fill="#e0ecff"/>
    <rect x="108" y="52" width="60" height="22" rx="6" fill="#f1f5f9"/>
    <rect x="176" y="52" width="64" height="22" rx="6" fill="#f1f5f9"/>
    <!-- chart -->
    <rect x="20" y="92" width="220" height="120" rx="8" fill="#f8fafc"/>
    <polyline points="32,196 64,176 96,186 128,140 160,150 192,108 224,118" fill="none" stroke="#0891b2" stroke-width="2.5"/>
    <line x1="128" y1="92" x2="128" y2="212" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="32" y="108" width="200" height="22" rx="6" fill="#16a34a" opacity="0.18"/>
    <!-- metric chips -->
    <rect x="20" y="226" width="64" height="38" rx="8" fill="#eef2f7"/>
    <rect x="92" y="226" width="64" height="38" rx="8" fill="#eef2f7"/>
    <rect x="164" y="226" width="76" height="38" rx="8" fill="#eef2f7"/>
  </g>
</svg>
